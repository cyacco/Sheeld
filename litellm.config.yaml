# LiteLLM gateway config for the Docker Compose demo.
#
# The "sheeld-demo" model returns a canned response so the full guardrail
# pipeline works out of the box with no provider API key. To send real
# traffic, add your own model here (see https://docs.litellm.ai/docs/proxy/configs)
# and point your source's LLM model at it in the dashboard.
model_list:
  - model_name: sheeld-demo
    litellm_params:
      model: gpt-3.5-turbo
      mock_response: "Hello from Sheeld! This is a mock LiteLLM response — the guardrail pipeline ran end to end. Configure a real model in litellm.config.yaml to go live."
