## Sheeld Helm chart values

## Control plane (Go, :8080) — auth, CRUD, dashboard backend, workspace-config
api:
  replicaCount: 2
  image:
    repository: ghcr.io/cyacco/sheeld-api
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

## Data plane (Go, :8081) — the proxy: input guards → LLM → output guards
dataplane:
  replicaCount: 2
  image:
    repository: ghcr.io/cyacco/sheeld-server
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8081
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

## Web (Next.js dashboard)
web:
  replicaCount: 1
  image:
    repository: ghcr.io/cyacco/sheeld-web
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

## PostgreSQL — one instance per plane (cp-db: users/orgs/config, dp-db: audit
## logs), sharing this image/resources/storage spec. Disable and point the
## databaseURL / dpDatabaseURL secrets at external Postgres for production.
postgresql:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
  storage:
    size: 10Gi
    storageClassName: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

## Ingress (routes to the web dashboard)
ingress:
  enabled: false
  className: nginx
  host: sheeld.example.com
  tls:
    enabled: false
    secretName: sheeld-tls
  annotations: {}

## Control-plane config (non-sensitive)
config:
  logLevel: info
  proxyTimeout: "60s"
  rateLimitRPS: "100"
  rateLimitBurst: "200"
  maxBodyBytes: "1048576"
  corsAllowedOrigins: "https://sheeld.example.com"
  # Allow guard/transformer URLs on private/loopback addresses (SSRF off).
  # In-cluster guard targets (e.g. a Presidio service) resolve to private
  # IPs, so this is on by default for the bundled deployment.
  allowPrivateGuardURLs: "true"

## Data-plane config (non-sensitive)
dataplaneConfig:
  logLevel: info
  pollInterval: "5s"
  llmGatewayURL: "http://litellm:4000"
  llmRequestTimeout: "30s"
  allowPrivateGuardURLs: "true"
  # Audit-log retention. "0" keeps rows forever (default); set a duration
  # (e.g. "720h" for 30 days) to prune older rows periodically.
  auditRetention: "0"
  auditPruneInterval: "1h"

## Secrets (sensitive). jwtSecret, encryptionKey, and dataplaneToken have no
## usable defaults — the chart refuses to install until you set them:
##   helm install ... \
##     --set secrets.jwtSecret=$(openssl rand -hex 32) \
##     --set secrets.encryptionKey=$(openssl rand -hex 32) \
##     --set secrets.dataplaneToken=$(openssl rand -hex 32)
secrets:
  # Password for the bundled Postgres instances (ignored when postgresql
  # is disabled and you supply full *DatabaseURL overrides).
  postgresPassword: "sheeld"
  # Leave empty to use the bundled cp-db/dp-db; set to point at external
  # Postgres (the value must include credentials).
  databaseURL: ""
  dpDatabaseURL: ""
  jwtSecret: ""
  encryptionKey: ""
  # Shared static token authenticating the data plane to the control plane.
  dataplaneToken: ""

## Service account
serviceAccount:
  create: true
  name: ""
  annotations: {}

imagePullSecrets: []
