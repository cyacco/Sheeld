{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "sheeld.fullname" . }}
  labels:
    {{- include "sheeld.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: {{ include "sheeld.fullname" . }}-api
                port:
                  number: {{ .Values.api.service.port }}
          - path: /healthz
            pathType: Exact
            backend:
              service:
                name: {{ include "sheeld.fullname" . }}-api
                port:
                  number: {{ .Values.api.service.port }}
          - path: /openapi.yaml
            pathType: Exact
            backend:
              service:
                name: {{ include "sheeld.fullname" . }}-api
                port:
                  number: {{ .Values.api.service.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "sheeld.fullname" . }}-web
                port:
                  number: {{ .Values.web.service.port }}
{{- end }}
