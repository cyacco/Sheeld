{{- if not .Values.secrets.jwtSecret }}
{{- fail "secrets.jwtSecret is required — set a random value, e.g. --set secrets.jwtSecret=$(openssl rand -hex 32)" }}
{{- end }}
{{- if eq .Values.secrets.jwtSecret "change-me-in-production" }}
{{- fail "secrets.jwtSecret is still the sample value — set a real secret" }}
{{- end }}
{{- if not .Values.secrets.encryptionKey }}
{{- fail "secrets.encryptionKey is required — set a 64-char hex value, e.g. --set secrets.encryptionKey=$(openssl rand -hex 32)" }}
{{- end }}
{{- if not .Values.secrets.dataplaneToken }}
{{- fail "secrets.dataplaneToken is required — set a random value shared by both planes, e.g. --set secrets.dataplaneToken=$(openssl rand -hex 32)" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sheeld.fullname" . }}-secret
  labels:
    {{- include "sheeld.labels" . | nindent 4 }}
type: Opaque
data:
  SHEELD_DATABASE_URL: {{ include "sheeld.databaseURL" . | b64enc | quote }}
  SHEELD_JWT_SECRET: {{ .Values.secrets.jwtSecret | b64enc | quote }}
  SHEELD_ENCRYPTION_KEY: {{ .Values.secrets.encryptionKey | b64enc | quote }}
  SHEELD_DATAPLANE_TOKEN: {{ .Values.secrets.dataplaneToken | b64enc | quote }}
  # Consumed by the bundled cp/dp Postgres statefulsets.
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | b64enc | quote }}
