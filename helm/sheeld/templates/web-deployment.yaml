apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sheeld.fullname" . }}-web
  labels:
    {{- include "sheeld.labels" . | nindent 4 }}
    {{- include "sheeld.web.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.web.replicaCount }}
  selector:
    matchLabels:
      {{- include "sheeld.web.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sheeld.web.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "sheeld.serviceAccountName" . }}
      containers:
        - name: web
          image: "{{ .Values.web.image.repository }}:{{ .Values.web.image.tag }}"
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://{{ include "sheeld.fullname" . }}-api:{{ .Values.api.service.port }}"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
