apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sheeld.fullname" . }}-dataplane-secret
  labels:
    {{- include "sheeld.labels" . | nindent 4 }}
type: Opaque
data:
  SHEELD_DP_DATABASE_URL: {{ include "sheeld.dpDatabaseURL" . | b64enc | quote }}
  # Must match the control plane's SHEELD_DATAPLANE_TOKEN.
  SHEELD_DP_TOKEN: {{ .Values.secrets.dataplaneToken | b64enc | quote }}
