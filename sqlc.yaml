version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/controlplane/db/queries"
    schema: "internal/controlplane/db/migrations"
    gen:
      go:
        package: "generated"
        out: "internal/controlplane/db/generated"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_empty_slices: true
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "timestamptz"
            go_type:
              import: "time"
              type: "Time"
          - db_type: "jsonb"
            go_type:
              import: "encoding/json"
              type: "RawMessage"
