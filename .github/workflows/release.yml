name: Release

# Cut a release by pushing a semver tag, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
# This builds and pushes the three container images to GHCR and creates a
# GitHub Release with auto-generated notes.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write # create the GitHub Release
  packages: write # push images to GHCR

jobs:
  images:
    name: Build & push images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: sheeld-api
            context: .
            file: Dockerfile
            target: control-plane
          - image: sheeld-server
            context: .
            file: Dockerfile
            target: sheeld-server
          - image: sheeld-web
            context: web
            file: web/Dockerfile
            target: ""
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          # v1.2.3 → tags 1.2.3, 1.2, and latest (latest only on non-prerelease).
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: images
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          # Mark vX.Y.Z-rc.N / -beta etc. as prereleases automatically.
          prerelease: ${{ contains(github.ref_name, '-') }}
