name: Bug report
description: Report a problem with Sheeld
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! For **security vulnerabilities**, do not use this
        form — see [SECURITY.md](https://github.com/cyacco/Sheeld/blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you observe, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps, config, and the request/response if relevant. Redact secrets.
      placeholder: |
        1. Create a source with ...
        2. Attach a guardrail ...
        3. POST /v1/proxy/... with ...
        4. See error
    validations:
      required: true
  - type: input
    id: component
    attributes:
      label: Component
      description: Control plane, data plane, dashboard, Helm chart, ...
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Release tag or git commit SHA.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Include the X-Request-ID if you have one. Redact secrets and PII.
      render: shell
