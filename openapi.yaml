openapi: "3.0.3"
info:
  title: Sheeld API
  description: Segment for LLM guardrails — a full LLM proxy that validates input, proxies LLM calls, and validates output.
  version: "1.0.0"
  license:
    name: Apache 2.0

servers:
  - url: http://localhost:8080
    description: Control plane (auth, config CRUD, audit logs) — local development
  - url: http://localhost:8081
    description: Data plane (proxy) — local development. Only /v1/proxy/* and /healthz are served here.

security: []

paths:
  /healthz:
    get:
      summary: Health check
      operationId: healthCheck
      tags: [System]
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  db:
                    type: string
                    example: connected
        "503":
          description: Unhealthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  db:
                    type: string
                    example: disconnected

  /v1/auth/register:
    post:
      summary: Register a new organization and user
      operationId: register
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [org_name, email, password]
              properties:
                org_name:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/auth/login:
    post:
      summary: Log in with email and password
      operationId: login
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/auth/refresh:
    post:
      summary: Refresh a JWT token
      operationId: refreshToken
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Token refreshed
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/auth/api-keys:
    post:
      summary: Create an API key
      operationId: createApiKey
      tags: [Auth]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        "201":
          description: API key created
          content:
            application/json:
              schema:
                type: object
                properties:
                  api_key:
                    $ref: "#/components/schemas/ApiKey"
                  raw_key:
                    type: string
                    description: Only returned at creation time
        "401":
          $ref: "#/components/responses/Unauthorized"
    get:
      summary: List API keys
      operationId: listApiKeys
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: API key list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApiKey"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/auth/api-keys/{id}:
    delete:
      summary: Revoke an API key
      operationId: revokeApiKey
      tags: [Auth]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: revoked
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/models:
    get:
      summary: List supported LLM models
      operationId: listModels
      tags: [Models]
      security:
        - bearerAuth: []
      parameters:
        - name: provider
          in: query
          schema:
            type: string
          description: Filter by provider (e.g. "openai", "anthropic")
      responses:
        "200":
          description: Model list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ModelInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/sources:
    post:
      summary: Create a source
      operationId: createSource
      tags: [Sources]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SourceInput"
      responses:
        "201":
          description: Source created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Source"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
    get:
      summary: List sources
      operationId: listSources
      tags: [Sources]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Source list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Source"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/sources/{id}:
    get:
      summary: Get a source
      operationId: getSource
      tags: [Sources]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Source details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Source"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      summary: Update a source
      operationId: updateSource
      tags: [Sources]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SourceInput"
      responses:
        "200":
          description: Source updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Source"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      summary: Delete a source
      operationId: deleteSource
      tags: [Sources]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: deleted
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/sources/{sourceID}/guardrails:
    get:
      summary: List guardrails attached to a source
      operationId: listGuardrailsBySource
      tags: [Sources, Guardrails]
      security:
        - bearerAuth: []
      parameters:
        - name: sourceID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Guardrail list for this source
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Guardrail"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/guardrails:
    post:
      summary: Create a guardrail
      operationId: createGuardrail
      tags: [Guardrails]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GuardrailInput"
      responses:
        "201":
          description: Guardrail created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Guardrail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
    get:
      summary: List all guardrails for the organization
      operationId: listGuardrails
      tags: [Guardrails]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Guardrail list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Guardrail"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/guardrails/{id}:
    get:
      summary: Get a guardrail
      operationId: getGuardrail
      tags: [Guardrails]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Guardrail details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Guardrail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      summary: Update a guardrail
      operationId: updateGuardrail
      tags: [Guardrails]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GuardrailInput"
      responses:
        "200":
          description: Guardrail updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Guardrail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      summary: Delete a guardrail
      operationId: deleteGuardrail
      tags: [Guardrails]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: deleted
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/guardrails/{id}/sources:
    post:
      summary: Attach a guardrail to a source
      operationId: attachGuardrailToSource
      tags: [Guardrails]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [source_id]
              properties:
                source_id:
                  type: string
                  format: uuid
      responses:
        "201":
          description: Attached
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: attached
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
    get:
      summary: List sources attached to a guardrail
      operationId: listGuardrailSources
      tags: [Guardrails]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Source summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SourceSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/guardrails/{id}/sources/{sourceID}:
    delete:
      summary: Detach a guardrail from a source
      operationId: detachGuardrailFromSource
      tags: [Guardrails]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: sourceID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Detached
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: detached
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/internal/workspace-config:
    get:
      summary: Workspace configuration payload for data planes
      description: >
        Served by the control plane and polled by data planes (~5s) using
        the shared static data-plane token. Supports ETag/If-None-Match with
        304 responses. The payload contains plaintext LLM API keys — it must
        never be logged, and the channel requires TLS outside development.
      operationId: getWorkspaceConfig
      tags: [Internal]
      security:
        - dataPlaneToken: []
      parameters:
        - name: If-None-Match
          in: header
          schema:
            type: string
      responses:
        "200":
          description: Full workspace configuration
          headers:
            ETag:
              schema:
                type: string
        "304":
          description: Configuration unchanged
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/proxy/{sourceRoute}:
    post:
      summary: Proxy an LLM request through guardrails (served by the data plane)
      description: >
        OpenAI-compatible. On pass, returns the raw chat completion, so an
        OpenAI SDK can use base_url `.../v1/proxy/{sourceRoute}` unmodified
        (the SDK appends /chat/completions, which is served as an alias).
        On guardrail rejection, returns 422 with an OpenAI-style error of
        type `guardrail_rejection`; full guard results are available only
        via audit logs (correlate with the X-Request-ID response header).
      operationId: proxy
      tags: [Proxy]
      security:
        - apiKeyAuth: []
      parameters:
        - name: sourceRoute
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: Request passed all guards; raw OpenAI chat completion
          headers:
            X-Sheeld-Status:
              schema:
                type: string
                enum: [pass]
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatCompletion"
        "422":
          description: Request rejected by guardrails
          headers:
            X-Sheeld-Status:
              schema:
                type: string
                enum: [rejected]
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenAIError"
        "401":
          description: Invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenAIError"
        "429":
          description: Rate limit exceeded
          headers:
            Retry-After:
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/proxy/{sourceRoute}/chat/completions:
    post:
      summary: Alias of /v1/proxy/{sourceRoute} for OpenAI SDK base_url compatibility
      operationId: proxyChatCompletions
      tags: [Proxy]
      security:
        - apiKeyAuth: []
      parameters:
        - name: sourceRoute
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: Request passed all guards; raw OpenAI chat completion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatCompletion"
        "422":
          description: Request rejected by guardrails
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenAIError"

  /v1/transformers:
    post:
      summary: Create a transformer (Transformation)
      description: >
        Transformers rewrite the whole messages array sequentially before
        input guards and the LLM call; they never reject requests. v1 is
        input-phase only and ships no built-in transformer types.
        transformer_type is validated against the server's registry.
        Config accepts "on_error": "fail_closed" (default — an errored
        transformer aborts the request) | "fail_open" (skip it).
      operationId: createTransformer
      tags: [Transformers]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransformerInput"
      responses:
        "201":
          description: Transformer created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transformer"
        "422":
          description: Unknown transformer_type or invalid phase
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      summary: List all transformers for the organization
      operationId: listTransformers
      tags: [Transformers]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Transformer list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transformer"

  /v1/transformers/{id}:
    get:
      summary: Get a transformer
      operationId: getTransformer
      tags: [Transformers]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Transformer details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transformer"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      summary: Update a transformer
      operationId: updateTransformer
      tags: [Transformers]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransformerInput"
      responses:
        "200":
          description: Transformer updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transformer"
    delete:
      summary: Delete a transformer
      operationId: deleteTransformer
      tags: [Transformers]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Deleted

  /v1/transformers/{id}/sources:
    post:
      summary: Attach a transformer to a source (appends to the chain)
      operationId: attachTransformerToSource
      tags: [Transformers]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [source_id]
              properties:
                source_id: { type: string, format: uuid }
      responses:
        "201":
          description: Attached at the end of the source's chain

  /v1/transformers/{id}/sources/{sourceID}:
    delete:
      summary: Detach a transformer from a source
      operationId: detachTransformerFromSource
      tags: [Transformers]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: sourceID
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Detached

  /v1/sources/{sourceID}/transformers:
    get:
      summary: List a source's transformer chain in execution order
      operationId: listSourceTransformers
      tags: [Transformers]
      security:
        - bearerAuth: []
      parameters:
        - name: sourceID
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Ordered transformer list (includes position)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transformer"
    put:
      summary: Replace the source's transformer chain with the given ordered ids
      operationId: setSourceTransformers
      tags: [Transformers]
      security:
        - bearerAuth: []
      parameters:
        - name: sourceID
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [transformer_ids]
              properties:
                transformer_ids:
                  type: array
                  items: { type: string, format: uuid }
      responses:
        "200":
          description: Chain replaced (positions 0..n-1)
        "422":
          description: Duplicate or unknown transformer ids

  /v1/audit-logs:
    get:
      summary: List audit logs
      operationId: listAuditLogs
      tags: [Audit Logs]
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: source_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Audit log list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditLog"
        "401":
          $ref: "#/components/responses/Unauthorized"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    apiKeyAuth:
      type: http
      scheme: bearer
      description: API key (shld_* prefix)
    dataPlaneToken:
      type: http
      scheme: bearer
      description: Shared static token authenticating data planes (SHEELD_DATAPLANE_TOKEN)

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string

    AuthResponse:
      type: object
      properties:
        organization:
          type: object
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string

    LoginResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ApiKey:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        name:
          type: string
        key_prefix:
          type: string
        created_at:
          type: string
          format: date-time
        revoked_at:
          type: string
          format: date-time
          nullable: true

    ModelInfo:
      type: object
      properties:
        provider:
          type: string
        id:
          type: string

    SourceInput:
      type: object
      required: [name, route, llm_provider, llm_model, llm_api_key]
      properties:
        name:
          type: string
        route:
          type: string
        description:
          type: string
          nullable: true
        llm_provider:
          type: string
        llm_model:
          type: string
        llm_api_key:
          type: string
          description: Encrypted at rest, never returned in responses
        pass_criteria:
          type: string
          enum: [all, any, n_of_m]
          default: all
        pass_threshold:
          type: integer
          nullable: true
        enabled:
          type: boolean
          default: true

    Source:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        route:
          type: string
        description:
          type: string
          nullable: true
        llm_provider:
          type: string
        llm_model:
          type: string
        pass_criteria:
          type: string
        pass_threshold:
          type: integer
          nullable: true
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    SourceSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        route:
          type: string

    GuardrailInput:
      type: object
      required: [name, guard_type]
      properties:
        name:
          type: string
        guard_type:
          type: string
        phase:
          type: string
          enum: [input, output, both]
          default: input
        config:
          type: object
          description: >
            Guard-type-specific configuration. All guard types accept
            "on_error": "fail_open" | "fail_closed" (default fail_closed) —
            fail_open treats guard execution errors (e.g. an external
            service outage) as passed instead of blocking traffic.
            All guard types also accept "scope": "last_message" (default) |
            "all_messages" — all_messages validates the full serialized
            conversation (closes history-injection bypasses; applies to the
            input phase only).
            The "webhook" guard type takes {"url", "headers"?, "timeout_seconds"?}
            and POSTs {"input", "phase", "source_route"} to the URL, expecting
            {"passed": bool, "message"?, "details"?} back; non-2xx or malformed
            responses count as guard errors governed by on_error.
          additionalProperties: true
        enabled:
          type: boolean
          default: true

    Guardrail:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        name:
          type: string
        guard_type:
          type: string
        phase:
          type: string
        config:
          type: object
          additionalProperties: true
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TransformerInput:
      type: object
      required: [name, transformer_type]
      properties:
        name: { type: string }
        transformer_type: { type: string }
        phase:
          type: string
          enum: [input]
          default: input
        config:
          type: object
          additionalProperties: true
        enabled:
          type: boolean
          default: true

    Transformer:
      type: object
      properties:
        id: { type: string, format: uuid }
        organization_id: { type: string, format: uuid }
        name: { type: string }
        transformer_type: { type: string }
        phase: { type: string }
        config:
          type: object
          additionalProperties: true
        enabled: { type: boolean }
        position:
          type: integer
          description: Only present when listed via a source's chain
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ChatRequest:
      type: object
      required: [messages]
      properties:
        model:
          type: string
        messages:
          type: array
          items:
            type: object
            required: [role, content]
            properties:
              role:
                type: string
                enum: [system, user, assistant]
              content:
                type: string
        temperature:
          type: number
        max_tokens:
          type: integer
        top_p:
          type: number
        stop:
          type: array
          items:
            type: string

    ChatCompletion:
      type: object
      description: Raw OpenAI-format chat completion response
      properties:
        id:
          type: string
        object:
          type: string
          example: chat.completion
        created:
          type: integer
        model:
          type: string
        choices:
          type: array
          items:
            type: object
            properties:
              index:
                type: integer
              message:
                type: object
                properties:
                  role:
                    type: string
                  content:
                    type: string
              finish_reason:
                type: string
        usage:
          type: object
          properties:
            prompt_tokens:
              type: integer
            completion_tokens:
              type: integer
            total_tokens:
              type: integer

    OpenAIError:
      type: object
      description: OpenAI-compatible error envelope
      properties:
        error:
          type: object
          properties:
            message:
              type: string
            type:
              type: string
              example: guardrail_rejection
            code:
              type: string
              example: input_rejected
            param:
              type: string
              nullable: true

    GuardEngineResult:
      type: object
      properties:
        passed:
          type: boolean
        criteria:
          type: string
        threshold:
          type: integer
          nullable: true
        results:
          type: array
          items:
            type: object
            properties:
              guard_name:
                type: string
              guard_type:
                type: string
              passed:
                type: boolean
              message:
                type: string
              details:
                type: object
                additionalProperties: true
              duration_ms:
                type: integer
        total_duration_ms:
          type: integer
        pass_count:
          type: integer
        fail_count:
          type: integer

    AuditLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        source_id:
          type: string
          format: uuid
        input_hash:
          type: string
        guard_results:
          type: object
          description: >
            Per-phase engine results keyed by "input"/"output", plus the
            reserved key "transforms" holding the transformer chain outcome
            when the source has transformers.
          additionalProperties: true
        overall_result:
          type: string
          enum: [pass, fail]
        latency_ms:
          type: integer
        created_at:
          type: string
          format: date-time
