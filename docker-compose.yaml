services:
  cp-db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: sheeld
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sheeld_dev}
      POSTGRES_DB: sheeld
    volumes:
      - cp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sheeld"]
      interval: 5s
      timeout: 5s
      retries: 5

  dp-db:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: sheeld
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sheeld_dev}
      POSTGRES_DB: sheeld
    volumes:
      - dp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sheeld"]
      interval: 5s
      timeout: 5s
      retries: 5

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "4000:4000"
    command: ["--port", "4000"]
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  control-plane:
    build:
      context: .
      target: control-plane
    ports:
      - "8080:8080"
    environment:
      SHEELD_PORT: "8080"
      SHEELD_DATABASE_URL: "postgres://sheeld:${POSTGRES_PASSWORD:-sheeld_dev}@cp-db:5432/sheeld?sslmode=disable"
      SHEELD_JWT_SECRET: "${SHEELD_JWT_SECRET:-change-me}"
      SHEELD_ENCRYPTION_KEY: "${SHEELD_ENCRYPTION_KEY}"
      SHEELD_DATAPLANE_TOKEN: "${SHEELD_DATAPLANE_TOKEN:-change-me-too}"
      SHEELD_DATAPLANE_URL: "http://sheeld-server:8081"
      SHEELD_CORS_ALLOWED_ORIGINS: "http://localhost:3000"
      # Guard/transformer targets run on the compose-internal network.
      SHEELD_ALLOW_PRIVATE_GUARD_URLS: "true"
      SHEELD_LOG_LEVEL: "debug"
    depends_on:
      cp-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  sheeld-server:
    build:
      context: .
      target: sheeld-server
    ports:
      - "8081:8081"
    environment:
      SHEELD_DP_PORT: "8081"
      SHEELD_DP_DATABASE_URL: "postgres://sheeld:${POSTGRES_PASSWORD:-sheeld_dev}@dp-db:5432/sheeld?sslmode=disable"
      SHEELD_DP_CONTROL_PLANE_URL: "http://control-plane:8080"
      # Plain HTTP is acceptable only on the compose-internal network;
      # real deployments must use TLS between planes.
      SHEELD_DP_ALLOW_INSECURE_CP: "true"
      SHEELD_DP_TOKEN: "${SHEELD_DATAPLANE_TOKEN:-change-me-too}"
      SHEELD_DP_LLM_GATEWAY_URL: "http://litellm:4000"
      SHEELD_DP_LLM_REQUEST_TIMEOUT: "30s"
      SHEELD_DP_ALLOW_PRIVATE_GUARD_URLS: "true"
      SHEELD_DP_LOG_LEVEL: "debug"
    depends_on:
      dp-db:
        condition: service_healthy
      control-plane:
        condition: service_healthy
      litellm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  web:
    build: ./web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8080"
    depends_on:
      control-plane:
        condition: service_healthy
    restart: unless-stopped

volumes:
  cp_pgdata:
  dp_pgdata:
