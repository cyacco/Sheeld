services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: sheeld
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sheeld_dev}
      POSTGRES_DB: sheeld
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sheeld"]
      interval: 5s
      timeout: 5s
      retries: 5

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "4000:4000"
    command: ["--port", "4000"]
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      SHEELD_PORT: "8080"
      SHEELD_DATABASE_URL: "postgres://sheeld:${POSTGRES_PASSWORD:-sheeld_dev}@db:5432/sheeld?sslmode=disable"
      SHEELD_JWT_SECRET: "${SHEELD_JWT_SECRET:-change-me}"
      SHEELD_ENCRYPTION_KEY: "${SHEELD_ENCRYPTION_KEY}"
      SHEELD_LLM_GATEWAY_URL: "http://litellm:4000"
      SHEELD_LLM_REQUEST_TIMEOUT: "30s"
      SHEELD_CORS_ALLOWED_ORIGINS: "http://localhost:3000"
      SHEELD_LOG_LEVEL: "debug"
    depends_on:
      db:
        condition: service_healthy
      litellm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  web:
    build: ./web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8080"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
